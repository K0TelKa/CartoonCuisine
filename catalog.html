<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог - Cartoon Cuisine</title>
    
    <!-- Подключение стилей -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Шапка -->
    <header>
        <div class="header-inner">
            <a href="index.html" class="logo">🍽️ Cartoon Cuisine</a>

            <nav class="nav-links">
                <a href="index.html">Главная</a>
                <a href="catalog.html">Каталог</a>
                <a href="add.html">Добавить</a>
            </nav>

            <div class="profile-area">
                <button type="button" class="profile-btn profile-btn-loading" id="profile-btn">⏳ Загрузка...</button>
            </div>
        </div>
    </header>

    <div class="modal-overlay" id="auth-modal" style="display:none;">
        <div class="auth-modal-window">
            <button type="button" class="modal-close-btn" id="auth-modal-close">✕</button>

            <div id="auth-guest-view">
                <h2>Вход / Регистрация</h2>

                <div class="auth-form-group">
                    <label for="modal-auth-email">Email</label>
                    <input type="email" id="modal-auth-email" placeholder="Введите email">
                </div>

                <div class="auth-form-group">
                    <label for="modal-auth-password">Пароль</label>
                    <input type="password" id="modal-auth-password" placeholder="Введите пароль">
                </div>

                <div class="auth-modal-actions">
                    <button type="button" id="modal-login-btn" class="auth-main-btn">Войти</button>
                    <button type="button" id="modal-signup-btn" class="auth-secondary-btn">Регистрация</button>
                </div>
            </div>

            <div id="auth-user-view" style="display:none;">
                <h2>Личный кабинет</h2>
                <p class="profile-email-label">Вы вошли как:</p>
                <p id="modal-user-email" class="profile-email-value"></p>

                <div class="auth-modal-actions">
                    <button type="button" id="modal-logout-btn" class="auth-main-btn">Выйти</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Контейнер (содержит Сайдбар и Контент рядом) -->
    <div class="container">
        
        <!-- Сайдбар -->
        <aside>
            <div class="sidebar-title">Категории</div>

            <a href="catalog.html" class="sidebar-btn-all">
                📋 Все рецепты
            </a>

            <details>
                <summary>🎮 Игры</summary>
                <div class="sub-menu" id="menu-games"></div>
            </details>

            <details>
                <summary>🎬 Фильмы</summary>
                <div class="sub-menu" id="menu-movies"></div>
            </details>

            <details>
                <summary>📺 Мультфильмы</summary>
                <div class="sub-menu" id="menu-cartoons"></div>
            </details>

            <details>
                <summary>🍿 Сериалы</summary>
                <div class="sub-menu" id="menu-series"></div>
            </details>
            
            <br>
            <a href="catalog.html" style="display:block; text-align:center; color:#e74c3c; font-weight:bold; font-size: 0.9rem;">
                ✖ Сбросить фильтры
            </a>
            <div class="sidebar-ad">
                <div class="sidebar-ad-label">Реклама</div>

                <div class="sidebar-ad-slider" id="sidebar-ad-slider">
                    <a href="#" target="_blank" rel="noopener noreferrer" class="sidebar-ad-link" id="sidebar-ad-link">
                        <img src="" alt="Реклама" class="sidebar-ad-img" id="sidebar-ad-img">
                    </a>

                    <div class="sidebar-ad-dots" id="sidebar-ad-dots"></div>
                </div>
            </div>
        </aside>

        <!-- Сетка с рецептами -->
        <main>
            <h2 id="page-title" style="margin-bottom: 20px;">Все рецепты</h2>
            
            <input type="text" id="search-input" class="search-box" placeholder="Поиск блюда в текущей категории...">

            <!-- Панель фильтров -->
            <div class="filters-panel">
                <select id="filter-type" class="filter-select">
                    <option value="all">🍽️ Любой тип</option>
                    <option value="main">🍗 Горячее</option>
                    <option value="soup">🍲 Суп</option>
                    <option value="salad">🥗 Салат</option>
                    <option value="pasta">🍝 Паста</option>
                    <option value="baking">🥐 Выпечка</option>
                    <option value="fastfood">🍔 Фастфуд</option>
                    <option value="breakfast">🍳 Завтрак</option>
                    <option value="dessert">🍰 Десерт</option>
                    <option value="drink">🥤 Напиток</option>
                    <option value="snack">🥪 Закуска</option>
                    <option value="sauce">🍡 Соус</option>   
                </select>

                <select id="filter-diff" class="filter-select">
                    <option value="all">⚔️ Любая сложность</option>
                    <option value="easy">🟢 Легко</option>
                    <option value="medium">🟡 Средне</option>
                    <option value="hard">🔴 Сложно</option>
                </select>
            </div>
            <!-- Сетка -->
            <div id="recipes-grid" class="recipes-grid">
                <p style="text-align: center; color: #777;">⏳ Загрузка...</p>
            </div>
        </main>

    </div> 

    <!-- Подвал -->
    <footer>
        <div class="footer-partners">
            <div class="footer-partners-title">Наши партнёры</div>

            <div class="footer-partners-links">
                <a href="https://eda.yandex.ru/" target="_blank" rel="noopener noreferrer">Яндекс Еда</a>
                <a href="https://samokat.ru/" target="_blank" rel="noopener noreferrer">Самокат</a>
                <a href="https://myspar.ru/" target="_blank" rel="noopener noreferrer">Spar</a>
            </div>
        </div>

        <p>© 2025 Cartoon Cuisine</p>
    </footer>

    <!-- Скрипты -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/data.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/catalog.js"></script>
    <script src="js/ads.js"></script>
    <script src="js/auth.js"></script>

</body>
</html>
